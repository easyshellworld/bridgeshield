name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: "Backend — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: file:./test.db
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: file:./dev.db
          NODE_ENV: test
          LOG_LEVEL: error

  frontend-demo:
    name: "Frontend Demo — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-demo/package-lock.json

      - run: npm ci
      - run: npm run build
      - name: frontend tests
        run: npm run test

  frontend-admin:
    name: "Frontend Admin — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - run: npm ci
      - run: npm run build
      - name: frontend tests
        run:  npm run test

  sdk:
    name: "SDK — Build & Test"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

