name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: file:./test.db
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: file:./dev.db
          NODE_ENV: test
          LOG_LEVEL: error

  frontend-demo:
    name: Frontend Demo — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-demo/package-lock.json

      - run: npm ci
      - run: npm run build
      - name: Run tests (if test files exist)
        run: |
          if ls src/**/*.test.{ts,tsx} 2>/dev/null | head -1 | grep -q .; then npm test; else echo "No test files found, skipping tests"; fi

  frontend-admin:
    name: Frontend Admin — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - run: npm ci
      - run: npm run build
      - name: Run tests (if test files exist)
        run: |
          if ls src/**/*.test.{ts,tsx} 2>/dev/null | head -1 | grep -q .; then npm test; else echo "No test files found, skipping tests"; fi

  sdk:
    name: SDK — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test

  notify:
    name: Feishu Notification
    runs-on: ubuntu-latest
    needs: [backend, frontend-demo, frontend-admin, sdk]
    if: always()
    steps:
      - name: Send Feishu Notification
        uses: foxundermoon/feishu-action@v2
        with:
          webhook: ${{ secrets.FEISHU_WEBHOOK_URL }}
          secret: ${{ secrets.FEISHU_SIGN_SECRET }}
          msg_type: interactive
          card: |
            {
              "header": {
                "title": {
                  "tag": "plain_text",
                  "content": "BridgeShield CI 运行结果"
                },
                "template": "${{ contains(needs.*.result, 'failure') && 'red' || 'green' }}"
              },
              "elements": [
                {
                  "tag": "markdown",
                  "content": "**运行分支**: ${{ github.ref_name }}\n**触发人**: ${{ github.actor }}\n**提交信息**: ${{ github.event.head_commit.message }}\n**Backend**: ${{ needs.backend.result }}\n**Frontend Demo**: ${{ needs.frontend-demo.result }}\n**Frontend Admin**: ${{ needs.frontend-admin.result }}\n**SDK**: ${{ needs.sdk.result }}\n**详情**: [查看CI记录](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
                }
              ]
            }
