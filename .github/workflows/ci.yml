name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: file:./test.db
      - run: npm run build
      - run: npm test
        env:
          DATABASE_URL: file:./dev.db
          NODE_ENV: test
          LOG_LEVEL: error

  frontend-demo:
    name: Frontend Demo — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-demo

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-demo/package-lock.json

      - run: npm ci
      - run: npm run build

  frontend-admin:
    name: Frontend Admin — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-admin/package-lock.json

      - run: npm ci
      - run: npm run build
