# BridgeShield Demo - Netlify Configuration
# Project: frontend-demo
# Backend: https://bridgeshield.x404.online
# Created: 2026-04-15
# Version: 1.0

[build]
  # Build settings
  publish = "dist"
  command = "npm run build"
  
  # Build environment
  environment = { NODE_VERSION = "20" }

[build.environment]
  # Frontend environment variables (embedded at build time)
  VITE_API_BASE_URL = "/api"
  VITE_API_KEY = "bridgeshield-demo-key"

# Redirect rules (same as in _redirects file, but in TOML format)
[[redirects]]
  from = "/api/*"
  to = "https://bridgeshield.x404.online/api/:splat"
  status = 200
  force = true  # Override any existing rules

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=utf-8"

# Function configuration (if needed in the future)
# [[functions]]
#   directory = "netlify/functions"