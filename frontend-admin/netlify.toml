[build]
  publish = "dist"
  command = "npm ci && npm run build"
  
  # Build environment
  environment = { NODE_VERSION = "20" }

[build.environment]
  # Frontend environment variables (embedded at build time)
  VITE_API_BASE_URL = ""

# Redirect rules
[[redirects]]
  from = "/api/*"
  to = "https://bridgeshield.x404.online/api/:splat"
  status = 200
  force = true  # Override any existing rules

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache control for static assets - CRITICAL FOR MIME TYPE ISSUES
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "text/css; charset=utf-8"